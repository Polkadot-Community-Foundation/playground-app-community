name: Deploy to Bulletin

# Reusable workflow that uploads a built frontend artifact to Bulletin/IPFS
# under a given DotNS domain. Callers (deploy-frontend.yml, release.yml)
# build the artifact and pass the target domain + environment.
#
# Tool: @polkadot-community-foundation/polkadot-app-deploy (PCF fork of the
# former `bulletin-deploy`). Ships built-in `paseo-next-v2` and `summit` envs.
# See summit-deployer-skills/guides/BULLETIN_DEPLOY_MODEL.md.

on:
  workflow_call:
    inputs:
      dotns-domain:
        description: "DotNS domain name (with .dot extension)"
        required: true
        type: string
      artifact-name:
        description: "Name of the build artifact to download"
        required: true
        type: string
      env:
        description: "polkadot-app-deploy environment (devnet in PCF CI)"
        required: false
        type: string
        default: devnet
      environment:
        description: "GitHub Environment to gate the deploy on (e.g. 'production' for required reviewers)"
        required: false
        type: string
      max-retries:
        description: "Maximum number of deployment retry attempts"
        type: number
        default: 3
      runner:
        description: "Runner label"
        type: string
        default: ubuntu-latest
      publish:
        description: "Publish to the Publisher registry (lists the app in the browse directory). Summit now wires a Publisher (CLI >=0.11.1)."
        type: boolean
        default: false
    secrets:
      mnemonic:
        description: "Mnemonic for the DotNS domain owner / Bulletin uploader (direct signer)"
        required: true
    outputs:
      cid:
        description: "Content CID of the uploaded bundle"
        value: ${{ jobs.deploy.outputs.cid }}
      domain:
        description: "Full domain name (with .dot)"
        value: ${{ jobs.deploy.outputs.domain }}
      url:
        description: "Browser URL (https://<domain>.li)"
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    outputs:
      cid: ${{ steps.deploy.outputs.cid }}
      # The CLI strips `.dot` from its `domain` output (returns the bare
      # label). Surface the caller's input instead so downstream consumers get
      # the full `<name>.dot` form they passed in.
      domain: ${{ inputs.dotns-domain }}
      url: ${{ steps.url.outputs.url }}
    steps:
      # Checkout FIRST (it git-cleans the workspace). The repo carries
      # polkadot-app-deploy.config.ts (product manifest: display name, icon,
      # app executable) + assets/. The CLI auto-discovers the config by name,
      # walking up from the build dir, so it must sit at the repo root next to
      # ./dist for the manifest to publish alongside the contenthash.
      - name: Fetch deploy config
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            polkadot-app-deploy.config.ts
            assets
          sparse-checkout-cone-mode: false

      # Download AFTER checkout so the artifact survives checkout's clean.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      # Hard rule: PCF CI targets the public products devnet. Refuse any other env.
      - name: Refuse non-devnet env
        run: |
          if [ "${{ inputs.env }}" != "devnet" ]; then
            echo "::error::env='${{ inputs.env }}' is not 'devnet'. PCF CI targets the public products devnet only."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install polkadot-app-deploy
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.12.0

      - name: Deploy to Bulletin
        id: deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: ${{ inputs.max-retries }}
          retry_wait_seconds: 30
          # --mnemonic = direct signer (required on Summit; --suri/pool is the
          #   unauthorized public dev phrase). --js-merkle skips the Kubo
          #   download. --publish lists the app in the browse directory; Summit
          #   wires a Publisher as of CLI >=0.11.1, so it is honored there now.
          command: >-
            APP_DOTNS_DOMAIN='${{ inputs.dotns-domain }}'
            polkadot-app-deploy './dist'
            --env '${{ inputs.env }}'
            --mnemonic "$MNEMONIC"
            --js-merkle
            ${{ inputs.publish && '--publish' || '' }}
            '${{ inputs.dotns-domain }}'
        env:
          MNEMONIC: ${{ secrets.mnemonic }}
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Validate deployment outputs
        run: |
          if [ -z "${{ steps.deploy.outputs.cid }}" ] || [ -z "${{ steps.deploy.outputs.domain }}" ]; then
            echo "::error::Deploy step completed but produced no CID or domain. Likely an OOM or silent crash."
            exit 1
          fi

      - name: Compute browser URL
        id: url
        run: echo "url=https://${{ inputs.dotns-domain }}.li" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        run: |
          {
            echo "### ${{ inputs.dotns-domain }}"
            echo
            echo "Env &nbsp; \`${{ inputs.env }}\`"
            echo "Browser &nbsp; ${{ steps.url.outputs.url }}"
            echo "Desktop &nbsp; \`${{ inputs.dotns-domain }}\`"
            echo "CID &nbsp; \`${{ steps.deploy.outputs.cid }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
