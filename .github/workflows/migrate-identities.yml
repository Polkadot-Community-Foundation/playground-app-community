# Migrate v0 "usernames" -> v1 identity bindings (account -> root_pubkey).
#
# The upstream migrate step calls importUsernames, which v1 dropped: v1 stores
# an identity *binding* (product H160 -> People AccountId32 root_pubkey), with
# the display name itself living on the People/Individuality chain. The v0
# snapshot has only the name, so scripts/migrate-identities.ts recovers each
# root by reverse-resolving the name against Summit People's Resources.Consumers,
# then submits adminSetIdentity(account, root) as the 5Fk8 admin (idempotent;
# skips already-bound; skips names with no/ambiguous Summit People identity).
#
# Run dry-run first (dry_run=true, the default) to review matches in the log,
# then re-run with dry_run=false to submit.
name: Migrate Identities

on:
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Dry-run only (report matches, submit nothing)"
                type: boolean
                default: true

concurrency:
    # 5Fk8 signs serially on-chain — never overlap with a deploy/migrate/grant.
    group: playground-registry-5fk8-writes
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    migrate-identities:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Bun (migrate-identities.ts runs TS directly)
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.2.9"

            - name: Migrate identities
              env:
                  MNEMONIC: ${{ secrets.MNEMONIC }}
                  PEOPLE_WS_URL: wss://summit-people-rpc.polkadot.io
                  ASSET_HUB_WS_URL: wss://summit-asset-hub-rpc.polkadot.io
                  RUN: ${{ inputs.dry_run == false && '1' || '0' }}
              run: bun scripts/migrate-identities.ts migration/seed-snapshot.json
