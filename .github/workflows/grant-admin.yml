# Registry admin ops on the live Summit playground registry, signed by the
# 5Fk8 admin/sudo. Two operations, selected by `op`:
#
#   grant-admin        — add_admin(<ss58>)  via scripts/add-admin.ts
#   migrate-identities — v0 usernames -> v1 account->root_pubkey bindings via
#                        scripts/migrate-identities.ts (adminSetIdentity)
#
# Both are plain PAPI scripts (no cdm toolchain): pnpm deps + bun + the 5Fk8
# MNEMONIC, with ASSET_HUB_WS_URL pointed at Summit AH. They resolve the
# @w3s/playground-registry address LIVE via ContractManager.fromLiveClient
# (-> latest version = the new v1 registry), so they always target whatever
# registry the committed cdm.json points at.
#
# (Filename kept as grant-admin.yml so it stays dispatchable from a branch via
# --ref while the rebaseline branch is not yet merged to main.)
name: Registry Admin Ops

on:
    workflow_dispatch:
        inputs:
            op:
                description: "Operation to run"
                type: choice
                options:
                    - grant-admin
                    - migrate-identities
                default: grant-admin
            ss58:
                description: "grant-admin: SS58 address to grant admin (ignored by migrate-identities)"
                required: false
                type: string
            identities_dry_run:
                description: "migrate-identities: dry-run only (report, submit nothing)"
                type: boolean
                default: true

concurrency:
    # 5Fk8 signs serially on-chain — never overlap with a deploy/migrate.
    group: playground-registry-5fk8-writes
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    admin-op:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Bun (scripts run TS directly)
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.2.9"

            - name: Grant admin
              if: ${{ inputs.op == 'grant-admin' }}
              env:
                  MNEMONIC: ${{ secrets.MNEMONIC }}
                  ASSET_HUB_WS_URL: wss://summit-asset-hub-rpc.polkadot.io
              run: |
                  if [ -z "${{ inputs.ss58 }}" ]; then
                    echo "::error::op=grant-admin requires the ss58 input"; exit 1
                  fi
                  bun scripts/add-admin.ts "${{ inputs.ss58 }}"

            - name: Migrate identities
              if: ${{ inputs.op == 'migrate-identities' }}
              env:
                  MNEMONIC: ${{ secrets.MNEMONIC }}
                  PEOPLE_WS_URL: wss://summit-people-rpc.polkadot.io
                  ASSET_HUB_WS_URL: wss://summit-asset-hub-rpc.polkadot.io
                  RUN: ${{ inputs.identities_dry_run == false && '1' || '0' }}
              run: bun scripts/migrate-identities.ts migration/seed-snapshot.json
